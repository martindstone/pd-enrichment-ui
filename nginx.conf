server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /sn-proxy/<hostname>/api/... → https://<hostname>/api/...
    # Requires resolver for dynamic proxy_pass with a variable.
    location ~ ^/sn-proxy/([^/]+)(/.+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
        set $sn_host $1;
        set $sn_path $2;

        proxy_pass          https://$sn_host$sn_path$is_args$args;
        proxy_ssl_server_name on;

        proxy_set_header    Host          $sn_host;
        proxy_set_header    Authorization $http_authorization;
        proxy_set_header    Accept        $http_accept;
        proxy_set_header    Content-Type  $content_type;
        # Don't leak the app's origin to the SN instance
        proxy_set_header    Origin        "";
        proxy_set_header    Referer       "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # SPA — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
